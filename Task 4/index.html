<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Instagram</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="phones-container">

  <div class="phone">
    <div class="notch"><span class="dot"></span><span class="speaker"></span><span class="dot"></span></div>
    <div class="screen">
      <div class="status-bar">
        <i class="fa-solid fa-signal"></i>
        <i class="fa-solid fa-wifi"></i>
        <i class="fa-solid fa-battery-full"></i>
      </div>

      <div class="header">
        <span class="placeholder-bar w-90"></span>
        <span class="icon-wrap">
          <i class="fa-solid fa-bars"></i>
          <span class="notif-dot"></span>
        </span>
      </div>

      <div class="profile-section">
        <div class="avatar-wrap">
          <div class="avatar"><i class="fa-solid fa-user"></i></div>
          <span class="add-badge"><i class="fa-solid fa-plus"></i></span>
        </div>
        <div class="stats">
          <span class="placeholder-bar w-36"></span>
          <span class="placeholder-bar w-36"></span>
          <span class="placeholder-bar w-36"></span>
        </div>
      </div>

      <div class="bio">
        <span class="placeholder-bar w-70"></span>
        <span class="placeholder-bar w-45"></span>
      </div>

      <div class="action-buttons">
        <span class="btn"></span>
        <span class="btn"></span>
        <span class="btn"></span>
      </div>

      <div class="highlights">
        <div class="highlight add"><i class="fa-solid fa-plus"></i></div>
        <div class="highlight circle-1"></div>
        <div class="highlight circle-2"></div>
        <div class="highlight circle-3"></div>
      </div>

      <div class="tabs">
        <span class="tab active"><i class="fa-solid fa-table-cells"></i></span>
        <span class="tab"><i class="fa-regular fa-user"></i></span>
      </div>

      <div class="grid">
        <div class="grid-item g1"></div>
        <div class="grid-item g2"></div>
        <div class="grid-item g3"></div>
        <div class="grid-item g4"></div>
        <div class="grid-item g5"></div>
        <div class="grid-item g6"></div>
      </div>

      <div class="bottom-nav">
        <i class="fa-solid fa-house"></i>
        <i class="fa-solid fa-magnifying-glass"></i>
        <i class="fa-regular fa-square-plus"></i>
        <i class="fa-regular fa-heart"></i>
        <i class="fa-solid fa-user active-nav"></i>
      </div>
    </div>
  </div>

  <div class="phone">
    <div class="notch"><span class="dot"></span><span class="speaker"></span><span class="dot"></span></div>
    <div class="screen">
      <div class="status-bar">
        <i class="fa-solid fa-signal"></i>
        <i class="fa-solid fa-wifi"></i>
        <i class="fa-solid fa-battery-full"></i>
      </div>

      <div class="header">
        <i class="fa-solid fa-camera header-icon"></i>
        <span class="placeholder-bar w-70"></span>
        <i class="fa-regular fa-paper-plane header-icon"></i>
      </div>

      <div class="stories-row">
        <div class="story-avatar your-story">
          <i class="fa-solid fa-user"></i>
          <span class="add-badge small"><i class="fa-solid fa-plus"></i></span>
        </div>
        <div class="story-avatar ring-1"><i class="fa-solid fa-user"></i></div>
        <div class="story-avatar ring-2"><i class="fa-solid fa-user"></i></div>
        <div class="story-avatar ring-3"><i class="fa-solid fa-user"></i></div>
      </div>

      <div class="likes-row">
        <div class="mini-avatar"><i class="fa-solid fa-user"></i></div>
        <span class="placeholder-bar w-55"></span>
      </div>

      <div class="post-image"></div>

      
      <div class="post-actions">
        <i class="fa-regular fa-heart"></i>
        <i class="fa-regular fa-comment"></i>
        <i class="fa-regular fa-paper-plane"></i>
        <i class="fa-regular fa-bookmark save-icon"></i>
      </div>

      <div class="likes-row">
        <div class="mini-avatar"><i class="fa-solid fa-user"></i></div>
        <span class="placeholder-bar w-55"></span>
      </div>

      <div class="caption">
        <span class="placeholder-bar w-80"></span>
        <span class="placeholder-bar w-40"></span>
      </div>

      <div class="bottom-nav">
        <i class="fa-solid fa-house"></i>
        <i class="fa-solid fa-magnifying-glass"></i>
        <i class="fa-regular fa-square-plus"></i>
        <span class="icon-wrap">
          <i class="fa-regular fa-heart"></i>
          <span class="notif-dot small"></span>
        </span>
        <i class="fa-regular fa-user"></i>
      </div>
    </div>
  </div>

  <div class="phone">
    <div class="notch"><span class="dot"></span><span class="speaker"></span><span class="dot"></span></div>
    <div class="screen">
      <div class="status-bar">
        <i class="fa-solid fa-signal"></i>
        <i class="fa-solid fa-wifi"></i>
        <i class="fa-solid fa-battery-full"></i>
      </div>

      <div class="header explore-header">
        <div class="search-bar">
          <i class="fa-solid fa-magnifying-glass"></i>
          <span class="placeholder-bar w-60"></span>
        </div>
        <i class="fa-solid fa-sliders header-icon"></i>
      </div>

      <div class="mosaic">
        <div class="tile t1"><i class="fa-solid fa-clone tile-icon"></i></div>
        <div class="tile t3"></div>
        <div class="tile t4"><i class="fa-solid fa-clone tile-icon"></i></div>
        <div class="tile t5"></div>
        <div class="tile t6"></div>
        <div class="tile t8"><i class="fa-solid fa-clone tile-icon"></i></div>
      </div>

      <div class="bottom-nav">
        <i class="fa-solid fa-house"></i>
        <i class="fa-solid fa-magnifying-glass active-nav"></i>
        <i class="fa-regular fa-square-plus"></i>
        <i class="fa-regular fa-heart"></i>
        <i class="fa-regular fa-user"></i>
      </div>
    </div>
  </div>

</div>

</body>
</html>
